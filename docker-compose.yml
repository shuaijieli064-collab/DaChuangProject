version: '3.8'

services:
  # FastAPI 后端
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
      - milvus_data:/app/data/milvus
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - zhilian
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis 缓存（仅内部网络访问）
  redis:
    image: redis:7-alpine
    # 不暴露端口，仅通过内部网络访问
    volumes:
      - redis_data:/data
    networks:
      - zhilian
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Milvus Lite (通过 API 服务内置)
  # 生产环境可替换为独立 Milvus 服务

  # Vue3 前端（开发阶段使用 Vite 代理）
  frontend:
    build:
      context: ./frontend-vue
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - zhilian

volumes:
  redis_data:
  milvus_data:

networks:
  zhilian:
    driver: bridge
