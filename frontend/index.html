<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智链校园 — 高校AI助手</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
  <style>
    /* ====== RESET & BASE ====== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #0a0e17;
      --bg-surface: #0f1623;
      --bg-elevated: #151d2e;
      --bg-glass: rgba(15, 22, 35, 0.7);
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-active: rgba(212, 168, 83, 0.4);
      --text-primary: #e8e4dd;
      --text-secondary: #8a8578;
      --text-dim: #4a4740;
      --gold: #d4a853;
      --gold-light: #e8c97a;
      --gold-dim: rgba(212, 168, 83, 0.12);
      --gold-glow: rgba(212, 168, 83, 0.25);
      --green: #4ade80;
      --blue: #60a5fa;
      --rose: #fb7185;
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --font-display: 'Outfit', 'Noto Serif SC', serif;
      --font-body: 'Noto Sans SC', sans-serif;
      --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text-primary);
      line-height: 1.6;
      overflow: hidden;
      height: 100vh;
    }

    /* ====== BACKGROUND NETWORK CANVAS ====== */
    #networkCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.35;
    }

    /* ====== AMBIENT GRADIENT ORBS ====== */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 20s ease-in-out infinite alternate;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(212,168,83,0.12) 0%, transparent 70%);
      top: -15%; right: -10%;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(96,165,250,0.08) 0%, transparent 70%);
      bottom: -10%; left: -5%;
      animation-delay: -8s;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(251,113,133,0.06) 0%, transparent 70%);
      top: 40%; left: 30%;
      animation-delay: -14s;
    }

    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -20px) scale(1.1); }
      100% { transform: translate(-20px, 15px) scale(0.95); }
    }

    /* ====== LAYOUT ====== */
    .app {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 280px 1fr;
      grid-template-rows: 64px 1fr;
      height: 100vh;
      gap: 0;
    }

    /* ====== HEADER ====== */
    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      background: rgba(10, 14, 23, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-subtle);
    }

    .logo-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-mark {
      width: 36px; height: 36px;
      position: relative;
    }

    .logo-mark svg {
      width: 100%; height: 100%;
    }

    .logo-text {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-divider {
      width: 1px;
      height: 20px;
      background: var(--border-subtle);
      margin: 0 0.5rem;
    }

    .logo-subtitle {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.5);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ====== SIDEBAR ====== */
    .sidebar {
      background: rgba(10, 14, 23, 0.5);
      backdrop-filter: blur(16px);
      border-right: 1px solid var(--border-subtle);
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      overflow-y: auto;
    }

    .sidebar-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      padding: 0.75rem 0.75rem 0.5rem;
      font-weight: 500;
    }

    .agent-card {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 0.85rem;
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      background: transparent;
      color: var(--text-secondary);
    }

    .agent-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--gold-dim), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .agent-card:hover {
      border-color: var(--border-subtle);
      color: var(--text-primary);
    }

    .agent-card:hover::before {
      opacity: 0.5;
    }

    .agent-card.active {
      border-color: var(--border-active);
      color: var(--text-primary);
      background: var(--bg-elevated);
    }

    .agent-card.active::before {
      opacity: 1;
    }

    .agent-icon-wrap {
      width: 38px; height: 38px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      transition: all 0.25s;
    }

    .agent-card.active .agent-icon-wrap {
      background: var(--gold-dim);
      border-color: var(--border-active);
    }

    .agent-info {
      position: relative;
      z-index: 1;
    }

    .agent-name {
      font-size: 0.875rem;
      font-weight: 500;
      line-height: 1.3;
    }

    .agent-desc {
      font-size: 0.7rem;
      color: var(--text-dim);
      line-height: 1.4;
    }

    /* ====== NEW CHAT BUTTON ====== */
    .new-chat-btn {
      margin-top: 0.5rem;
      padding: 0.7rem;
      border: 1px dashed var(--border-subtle);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--text-dim);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .new-chat-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-dim);
    }

    /* ====== MAIN CONTENT ====== */
    .main {
      display: grid;
      grid-template-rows: 1fr auto;
      overflow: hidden;
    }

    /* ====== MESSAGES ====== */
    .messages {
      padding: 2rem;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 4px;
    }
    .messages::-webkit-scrollbar-track {
      background: transparent;
    }
    .messages::-webkit-scrollbar-thumb {
      background: var(--border-subtle);
      border-radius: 4px;
    }

    /* ====== WELCOME SCREEN ====== */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      text-align: center;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .welcome-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--gold-dim);
      border: 1px solid var(--border-active);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 1.5rem;
      position: relative;
    }

    .welcome-icon::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid var(--border-active);
      animation: ringPulse 3s ease-in-out infinite;
    }

    @keyframes ringPulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0; transform: scale(1.15); }
    }

    .welcome h2 {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--text-primary), var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome p {
      font-size: 0.9rem;
      color: var(--text-secondary);
      max-width: 400px;
      margin-bottom: 2rem;
      line-height: 1.7;
    }

    /* ====== QUICK ACTION CARDS ====== */
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      width: 100%;
      max-width: 520px;
    }

    .quick-card {
      padding: 1rem 1.1rem;
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: left;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      opacity: 0;
      animation: cardReveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .quick-card:nth-child(1) { animation-delay: 0.15s; }
    .quick-card:nth-child(2) { animation-delay: 0.25s; }
    .quick-card:nth-child(3) { animation-delay: 0.35s; }
    .quick-card:nth-child(4) { animation-delay: 0.45s; }

    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .quick-card:hover {
      border-color: var(--border-active);
      background: var(--bg-elevated);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .quick-card-icon {
      font-size: 1.4rem;
      width: 40px; height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      background: var(--gold-dim);
      flex-shrink: 0;
    }

    .quick-card-text {
      font-size: 0.825rem;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .quick-card-text strong {
      display: block;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.15rem;
      font-size: 0.85rem;
    }

    /* ====== MESSAGE BUBBLES ====== */
    .message {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      animation: msgAppear 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes msgAppear {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .msg-avatar-icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.bot .msg-avatar-icon {
      background: var(--gold-dim);
      border: 1px solid var(--border-active);
    }

    .message.user .msg-avatar-icon {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
    }

    .msg-bubble {
      max-width: 70%;
      padding: 0.85rem 1.1rem;
      border-radius: var(--radius-lg);
      font-size: 0.875rem;
      line-height: 1.7;
    }

    .message.user .msg-bubble {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-bottom-right-radius: 4px;
      color: var(--text-primary);
    }

    .message.bot .msg-bubble {
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-subtle);
      border-bottom-left-radius: 4px;
    }

    .msg-bubble p { margin: 0.4rem 0; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 1.25rem; margin: 0.4rem 0; }
    .msg-bubble li { margin: 0.2rem 0; }
    .msg-bubble strong { color: var(--gold-light); }
    .msg-bubble code {
      background: rgba(0,0,0,0.3);
      padding: 0.15em 0.4em;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 0.82em;
    }
    .msg-bubble pre {
      background: rgba(0,0,0,0.4);
      padding: 1rem;
      border-radius: var(--radius-sm);
      overflow-x: auto;
      margin: 0.75rem 0;
    }
    .msg-bubble pre code {
      background: none;
      padding: 0;
    }
    .msg-bubble blockquote {
      border-left: 2px solid var(--gold);
      padding-left: 1rem;
      margin: 0.5rem 0;
      color: var(--text-secondary);
    }

    /* ====== TYPING INDICATOR ====== */
    .typing {
      display: flex;
      gap: 5px;
      padding: 0.5rem 0;
    }

    .typing span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: typingDot 1.4s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingDot {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }

    /* ====== INPUT BAR ====== */
    .input-bar {
      padding: 1rem 2rem 1.25rem;
      border-top: 1px solid var(--border-subtle);
      background: rgba(10, 14, 23, 0.6);
      backdrop-filter: blur(16px);
    }

    .input-inner {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      max-width: 800px;
      margin: 0 auto;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    .input-wrapper textarea {
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.875rem;
      resize: none;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.5;
      max-height: 120px;
    }

    .input-wrapper textarea::placeholder {
      color: var(--text-dim);
    }

    .input-wrapper textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px var(--gold-dim);
    }

    .send-btn {
      width: 44px; height: 44px;
      border-radius: var(--radius-md);
      border: none;
      background: var(--gold);
      color: var(--bg-deep);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      font-size: 1.1rem;
    }

    .send-btn:hover:not(:disabled) {
      background: var(--gold-light);
      transform: scale(1.05);
    }

    .send-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .send-btn.stop-active {
      background: var(--rose);
      color: white;
    }
    .send-btn.stop-active:hover {
      background: #f43f5e;
      transform: scale(1.05);
    }

    .input-hint {
      font-size: 0.7rem;
      color: var(--text-dim);
      text-align: center;
      margin-top: 0.5rem;
    }

    .input-hint kbd {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: 3px;
      padding: 0 4px;
      font-family: var(--font-mono);
      font-size: 0.65rem;
    }

    /* ====== HAMBURGER ====== */
    .hamburger {
      display: none;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      border: none;
      background: transparent;
      color: var(--text-primary);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .hamburger:hover {
      background: var(--gold-dim);
    }

    /* ====== DRAWER BACKDROP ====== */
    .drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 99;
    }
    .drawer-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    /* ====== KATEX & CODE BLOCKS ====== */
    .msg-bubble .katex { font-size: 1em; }
    .msg-bubble .katex-display {
      margin: 0.75rem 0;
      overflow-x: auto;
      padding: 0.5rem 0;
    }
    .msg-bubble pre {
      background: var(--bg-deep);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      overflow-x: auto;
      margin: 0.5rem 0;
      font-size: 0.82rem;
      line-height: 1.5;
    }
    .msg-bubble pre code {
      font-family: var(--font-mono);
      color: var(--text-primary);
    }
    .msg-bubble code {
      background: var(--bg-deep);
      border-radius: 3px;
      padding: 0.15em 0.35em;
      font-family: var(--font-mono);
      font-size: 0.85em;
      color: var(--gold-light);
    }
    .msg-bubble pre code {
      background: none;
      padding: 0;
      color: inherit;
      font-size: inherit;
    }

    /* ====== MODAL / DIALOG ====== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1rem;
      animation: fadeIn 0.2s ease;
    }
    .modal-overlay.open {
      display: flex;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 520px;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideUp 0.25s ease;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border-subtle);
    }
    .modal-header h3 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0;
    }
    .modal-header button {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0 0.25rem;
      line-height: 1;
      transition: color 0.2s;
    }
    .modal-header button:hover {
      color: var(--gold);
    }
    .modal-body {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .modal-footer {
      padding: 1rem 1.5rem 1.5rem;
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .form-group label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-input {
      background: var(--bg-deep);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 0.6rem 0.75rem;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.9rem;
      transition: border-color 0.2s;
      outline: none;
      width: 100%;
    }
    .form-input:focus {
      border-color: var(--gold);
    }
    .form-input::placeholder {
      color: var(--text-dim);
    }
    .form-textarea {
      min-height: 100px;
      resize: vertical;

<body>

  <script>
    // ====== NETWORK CANVAS ANIMATION ======
    const canvas = document.getElementById('networkCanvas');
    const ctx = canvas.getContext('2d');
    let nodes = [];
    let mouse = { x: -1000, y: -1000 };

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      initNodes();
    }

    function initNodes() {
      const count = Math.min(80, Math.floor((canvas.width * canvas.height) / 15000));
      nodes = [];
      for (let i = 0; i < count; i++) {
        nodes.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.3,
          r: Math.random() * 1.5 + 0.5,
        });
      }
    }

    function drawNetwork() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Update
      for (const n of nodes) {
        n.x += n.vx;
        n.y += n.vy;

        // Mouse repulsion
        const dx = n.x - mouse.x;
        const dy = n.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          n.vx += dx * 0.0003;
          n.vy += dy * 0.0003;
        }

        // Damping
        n.vx *= 0.999;
        n.vy *= 0.999;

        // Wrap
        if (n.x < -10) n.x = canvas.width + 10;
        if (n.x > canvas.width + 10) n.x = -10;
        if (n.y < -10) n.y = canvas.height + 10;
        if (n.y > canvas.height + 10) n.y = -10;
      }

      // Connections
      const maxDist = 120;
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < maxDist) {
            const alpha = (1 - dist / maxDist) * 0.5;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.strokeStyle = `rgba(212, 168, 83, ${alpha * 0.4})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }

      // Nodes
      for (const n of nodes) {
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(212, 168, 83, 0.6)';
        ctx.fill();
      }

      requestAnimationFrame(drawNetwork);
    }

    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    resizeCanvas();
    drawNetwork();

    // ====== APP STATE ======
    let currentAgent = 'general';
    let messages = [];
    let isStreaming = false;
    let currentWs = null;  // 当前 WebSocket 连接，用于停止

    const quickItems = {
      affairs: [
        { icon: '🏥', title: '请假手续', text: '如何办理请假手续？请详细说明流程、材料和注意事项。' },

        { icon: '🪪', title: '证件补办', text: '学生证丢失了如何补办？需要什么材料？' },
      ],
      academic: [
        { icon: '📖', title: '知识点提炼', featureKey: 'extract-knowledge' },
        { icon: '✏️', title: '生成练习题', featureKey: 'generate-questions' },
        { icon: '📅', title: '复习计划', featureKey: 'study-plan' },
        { icon: '📄', title: '文献综述', featureKey: 'literature-review' },
      ],
      growth: [
        { icon: '🗺️', title: '学业规划', featureKey: 'career-plan' },
        { icon: '📄', title: '简历优化', featureKey: 'resume-optimize' },
        { icon: '🎤', title: '面试训练', featureKey: 'interview-practice' },
        { icon: '🧭', title: '校园导航', featureKey: 'campus-nav' },
      ],
      general: [
        { icon: '👋', title: '打个招呼', text: '你好！请简单介绍一下你自己。' },
        { icon: '❓', title: '知识问答', text: '请解释一下量子纠缠是什么？' },
        { icon: '✍️', title: '创意写作', text: '请帮我写一首关于春天的短诗。' },
        { icon: '💻', title: '帮我写代码', text: '请帮我用 Python 写一个快速排序算法，并解释原理。' },
      ],
    };

    const agentNames = {
      affairs: '校园事务',
      academic: '学术辅助',
      growth: '成长助手',
      general: '通用对话',
    };

    // ====== FEATURE CONFIGURATIONS ======
    const featureConfigs = {
      'extract-knowledge': {
        title: '📖 知识点提炼',
        fields: [
          { name: 'file', type: 'file', label: '上传课件/教材', accept: '.pdf,.docx,.doc,.txt,.md', placeholder: '支持 PDF、DOCX、TXT 格式' },
          { type: 'divider', text: '或直接粘贴文本' },
          { name: 'text', type: 'textarea', label: '内容', placeholder: '粘贴课件或教材内容...' },
        ],
        submit: submitExtractKnowledge,

    // ====== MODAL FUNCTIONS ======
    function openModal(featureKey) {
      const config = featureConfigs[featureKey];
      if (!config) return;

      const overlay = document.getElementById('modalOverlay');
      const title = document.getElementById('modalTitle');
      const body = document.getElementById('modalBody');
      const footer = document.getElementById('modalFooter');

      title.textContent = config.title;
      body.innerHTML = renderFormHTML(config.fields);
      footer.innerHTML = `
        <button class="btn-modal-cancel" onclick="closeModal()">取消</button>
        <button class="btn-modal-submit" onclick="submitFeature('${featureKey}')">提交</button>
      `;

      overlay.classList.add('open');
      // Focus first input
      const firstInput = body.querySelector('input, textarea, select');
      if (firstInput) setTimeout(() => firstInput.focus(), 100);

      // Setup file input handler — direct event listeners on fresh references
      const fileDrop = body.querySelector('.form-file-drop');
      if (fileDrop) {
        const fileInput = fileDrop.querySelector('input[type="file"]');
        const fileNameDiv = fileDrop.closest('.form-group').querySelector('.form-file-name');

        // Clear any existing listeners by using event attributes (not addEventListener)
        fileDrop.onclick = function() { fileInput.click(); };
        fileDrop.ondragover = function(e) { e.preventDefault(); fileDrop.classList.add('dragover'); };
        fileDrop.ondragleave = function() { fileDrop.classList.remove('dragover'); };
        fileDrop.ondrop = function(e) {
          e.preventDefault();
          fileDrop.classList.remove('dragover');
          if (e.dataTransfer.files.length > 0) {
            // Use DataTransfer to work around read-only files property
            const dt = new DataTransfer();
            dt.items.add(e.dataTransfer.files[0]);
            fileInput.files = dt.files;
            fileNameDiv.textContent = e.dataTransfer.files[0].name;
          }
        };
        fileInput.onchange = function() {
          if (fileInput.files.length > 0) {
            fileNameDiv.textContent = fileInput.files[0].name;
          }
        };
      }
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    function renderFormHTML(fields) {
      return fields.map(f => {
        if (f.type === 'divider') {
          return `<div class="form-divider">${f.text || ''}</div>`;
        }
        if (f.type === 'file') {
          return `
            <div class="form-group">
              <label>${f.label}</label>
              <div class="form-file-drop">
                <div class="drop-icon">📁</div>
                <div>点击或拖拽文件到此区域</div>
                <p>${f.placeholder || ''}</p>
                <input type="file" name="${f.name}" accept="${f.accept || ''}">
              </div>
              <div class="form-file-name"></div>
            </div>
          `;
        }
        if (f.type === 'select') {
          const opts = f.options.map(o => `<option value="${o.value}" ${f.value === o.value ? 'selected' : ''}>${o.label}</option>`).join('');
          return `
            <div class="form-group">
              <label>${f.label}</label>
              <select class="form-input form-select" name="${f.name}">${opts}</select>
            </div>
          `;
        }
        if (f.type === 'textarea') {
          return `
            <div class="form-group">
              <label>${f.label}</label>
              <textarea class="form-input form-textarea" name="${f.name}" placeholder="${f.placeholder || ''}" rows="${f.rows || 3}">${f.value || ''}</textarea>
            </div>
          `;
        }
        if (f.type === 'date') {
          return `
            <div class="form-group">
              <label>${f.label}</label>
              <input class="form-input" type="date" name="${f.name}" value="${f.value || ''}">
            </div>
          `;
        }
        // default: text/number
        return `
          <div class="form-group">
            <label>${f.label}</label>
            <input class="form-input" type="${f.type || 'text'}" name="${f.name}" placeholder="${f.placeholder || ''}" value="${f.value || ''}">
          </div>
        `;
      }).join('');
    }

    async function submitExtractKnowledge() {
      const data = getFormData('extract-knowledge');
      const fileInput = getFileInput();

      if (!fileInput?.files[0] && !data.text) {
        throw new Error('请上传文件或输入文本');
      }

      let fileContent = '';

      if (fileInput?.files[0]) {
        // Step 1: Upload file to get text content
        messages.push({ role: 'user', content: `📎 上传文件：${fileInput.files[0].name}` });
        renderMessages();
        showTyping();

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        const uploadRes = await fetch('/api/academic/upload-file', {
          method: 'POST',
          body: formData,
        });
        let uploadResult;
        try {
          uploadResult = await uploadRes.json();
        } catch {
          hideTyping();
          messages.push({ role: 'bot', content: '❌ 文件上传失败' });
          renderMessages();
          return;
        }
        if (!uploadRes.ok) {
          hideTyping();
          messages.push({ role: 'bot', content: `❌ ${uploadResult.detail || uploadResult.error || '文件上传失败'}` });
          renderMessages();
          return;
        }
        fileContent = uploadResult.text;
        if (data.text) fileContent += '\n\n' + data.text;
      }

      // Step 2: Extract knowledge from content
      const content = fileContent || data.text;
      if (fileContent) {
        // Update user message
        const userMsgs = document.querySelectorAll('#messages .message.user');
        if (userMsgs.length > 0) {
          userMsgs[userMsgs.length - 1].querySelector('.msg-bubble').textContent = `📎 上传文件：${fileInput.files[0].name}` + (data.text ? ' + 补充文本' : '');
        }
      } else {
        messages.push({ role: 'user', content: `📝 提炼以下内容的知识点：\n\n${content.substring(0, 100)}...` });
        renderMessages();
        showTyping();
      }

      const res = await fetch('/api/academic/extract-knowledge', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content }),
      });
      let result;
      try {
        result = await res.json();
      } catch {
        hideTyping();
        messages.push({ role: 'bot', content: '❌ 服务器返回了无效响应' });
        renderMessages();
        return;
      }
      hideTyping();
      if (res.ok && result.result) {
        messages.push({ role: 'bot', content: result.result });
      } else {
        console.error('Extract knowledge error:', result);
        messages.push({ role: 'bot', content: `❌ ${result.detail || result.error || '请求失败'}` });
      }
      renderMessages();
    }

    function formatContent(text) {
      const placeholders = [];
      let phIdx = 0;

      const makePlaceholder = (type, content) => {
        const ph = `%%PH_${type}_${phIdx++}%%`;
        placeholders.push({ type, content, ph });
        return ph;
      };

      const renderMath = (content, displayMode) => {
        try {
          if (typeof katex !== 'undefined') {
            return katex.renderToString(content, { displayMode, throwOnError: false });
          }
        } catch {}
        return displayMode ? `$$${content}$$` : `$${content}$`;
      };

      // Step 1: Protect fenced code blocks
      text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        return makePlaceholder('code', { lang, code });
      });

      // Step 2: Protect display math $$...$$ and \[...\]
      text = text.replace(/\$\$([\s\S]*?)\$\$/g, (_, math) => {
        return makePlaceholder('displayMath', math);
      });
      text = text.replace(/\\\[(.*?)\\\]/gs, (_, math) => {
        return makePlaceholder('displayMath', math);
      });

      // Step 3: Protect inline math \(...\) and $...$
      text = text.replace(/\\\((.*?)\\\)/g, (_, math) => {
        return makePlaceholder('inlineMath', math);
      });
      // Dollar-sign inline math: match single-line content between unescaped $
      text = text.replace(/(?<!\$|\\)\$(?!\$)([^\$\n]+?)(?<!\$)\$(?!\$)/g, (_, math) => {
        return makePlaceholder('inlineMath', math);
      });

      // Step 4: HTML-escape remaining text
      let html = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // Step 5: Markdown-like formatting
      html = html
        .replace(/^### (.+)$/gm, '<h3 style="font-size:0.95rem;font-weight:600;margin:0.75rem 0 0.4rem;color:var(--gold-light)">$1</h3>')
        .replace(/^## (.+)$/gm, '<h2 style="font-size:1.05rem;font-weight:700;margin:0.75rem 0 0.4rem;color:var(--gold-light)">$1</h2>')
        .replace(/^# (.+)$/gm, '<h1 style="font-size:1.15rem;font-weight:700;margin:0.75rem 0 0.4rem;color:var(--gold-light)">$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
        .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
        .replace(/\n/g, '<br>');

      // Wrap consecutive <li> in <ul>
      html = html.replace(/(<li>.*?<\/li>(?:<br>)?)+/gs, (match) => {
        return `<ul>${match.replace(/<br>/g, '')}</ul>`;
      });

      // Step 6: Restore placeholders
      for (const item of placeholders) {
        let rendered;
        if (item.type === 'code') {
          const langLabel = item.content.lang ? `<div style="font-size:0.7rem;color:var(--text-secondary);margin-bottom:0.25rem">${item.content.lang}</div>` : '';
          const escaped = item.content.code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          rendered = `<pre>${langLabel}<code>${escaped}</code></pre>`;
        } else if (item.type === 'displayMath') {
          rendered = renderMath(item.content, true);
        } else {
          rendered = renderMath(item.content, false);
        }
        html = html.split(item.ph).join(rendered);
      }

      return html;
    }

    function showTyping() {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'message bot';
      div.id = 'typingIndicator';
      div.innerHTML = `
        <div class="msg-avatar-icon">🔗</div>
        <div class="msg-bubble">
          <div class="typing"><span></span><span></span><span></span></div>
        </div>
      `;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    // ====== COPY & STOP ======
    async function copyMessage(msgId) {
      const el = document.getElementById(msgId);
      if (!el) return;
      const text = el.innerText || el.textContent;
      try {
        await navigator.clipboard.writeText(text);
        const btn = el.parentElement.querySelector('.copy-btn');
        if (btn) {
          btn.classList.add('copied');
          btn.title = '已复制';
          btn.innerHTML = '✓';
          setTimeout(() => {
            btn.classList.remove('copied');
            btn.title = '复制';
            btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
          }, 1500);
        }
      } catch {}
    }

    function stopStreaming() {
      if (currentWs) {
        currentWs.close();
        currentWs = null;
      }
      hideTyping();
      isStreaming = false;
      updateSendBtn();
    }

    // ====== ACTIONS ======
    function toggleDrawer() {
      document.querySelector('.sidebar').classList.toggle('open');
      document.querySelector('.drawer-backdrop').classList.toggle('open');
    }
    function closeDrawer() {
      document.querySelector('.sidebar').classList.remove('open');
      document.querySelector('.drawer-backdrop').classList.remove('open');
    }

    function switchAgent(agent, el) {
      // 保存当前 agent 的消息
      saveMessages();
      currentAgent = agent;
      // 加载新 agent 的消息
      messages = [];
      loadMessages();

      // Update sidebar cards
      document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('active'));
      if (el) {
        el.classList.add('active');
      } else {
        document.querySelectorAll(`.agent-card[data-agent="${agent}"]`).forEach(c => c.classList.add('active'));
      }

      // Update input placeholder
      const placeholders = {
        affairs: '输入校园事务问题，如：请假流程、奖学金申请…',
        academic: '输入课程内容、课件文字或知识点…',
        growth: '如：学业规划建议、简历优化、面试训练…',
        general: '有什么想聊的？随便问…',
      };
      document.getElementById('chatInput').placeholder = placeholders[agent];

      closeDrawer();
      renderQuickGrid();
      renderMessages();
    }

    function newChat() {
      messages = [];
      saveMessages();
      renderMessages();
    }

    function saveMessages() {
      try {
        localStorage.setItem('chat_' + currentAgent, JSON.stringify(messages));
      } catch {}
    }

    function loadMessages() {
      try {
        const data = localStorage.getItem('chat_' + currentAgent);
        if (data) messages = JSON.parse(data);
      } catch {}
    }

    function sendQuick(text) {
      document.getElementById('chatInput').value = text;
      sendMessage();
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || isStreaming) return;

      input.value = '';
      autoResize(input);
      updateSendBtn();

      messages.push({ role: 'user', content: text });
      renderMessages();

      isStreaming = true;
      document.getElementById('sendBtn').disabled = true;
      showTyping();

      try {
        // Try WebSocket streaming
        await streamChat(text);
      } catch (err) {
        console.warn('WebSocket failed, falling back to HTTP:', err);
        await httpChat(text);
      }

      hideTyping();
      isStreaming = false;
      updateSendBtn();
    }

    async function streamChat(message) {
      return new Promise((resolve, reject) => {
        const ws = new WebSocket(
          `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.host}/ws/chat`
        );
        currentWs = ws;

        const timeout = setTimeout(() => {
          ws.close();
          reject(new Error('timeout'));
        }, 10000);

        let resolved = false;

        ws.onopen = () => {
          ws.send(JSON.stringify({ message, intent: currentAgent, history: [] }));
        };

        let aiContent = '';

        ws.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            if (data.type === 'chunk') {
              aiContent += data.content;
              updateBotMessage(aiContent);
            } else if (data.type === 'done') {
              clearTimeout(timeout);
              ws.close();
              if (!resolved) {
                resolved = true;
                const botMsg = { role: 'bot', content: aiContent || data.content };
                // 附带来源信息
                if (data.sources) botMsg.sources = data.sources;
                messages.push(botMsg);
                saveMessages();
                renderMessages();
              }
              resolve();
            } else if (data.error) {
              clearTimeout(timeout);
              ws.close();
              reject(new Error(data.error));
            }
          } catch {
            // Plain text response
            aiContent += event.data;
            updateBotMessage(aiContent);
          }
        };

        ws.onerror = () => {
          clearTimeout(timeout);
          reject(new Error('ws error'));
        };

        ws.onclose = () => {
          clearTimeout(timeout);
          currentWs = null;
          if (aiContent && !resolved) {
            resolved = true;
            messages.push({ role: 'bot', content: aiContent });
            saveMessages();
            renderMessages();
          }
          resolve();
        };
      });
    }

    async function httpChat(message) {
      try {
        const res = await fetch('/api/agent/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, intent: currentAgent }),
        });
        const data = await res.json();
        hideTyping();
        const result = data.result || '请求失败，请重试';
        messages.push({ role: 'bot', content: result });
        saveMessages();
        renderMessages();
      } catch {
        hideTyping();
        messages.push({ role: 'bot', content: '网络错误，请稍后重试。' });
        saveMessages();
        renderMessages();
      }
    }

    function updateBotMessage(content) {
      hideTyping();

      // Find or create bot message element
      let botEl = document.getElementById('streamingMessage');
      if (!botEl) {
        const container = document.getElementById('messages');
        botEl = document.createElement('div');
        botEl.className = 'message bot';
        botEl.id = 'streamingMessage';
        botEl.innerHTML = `
          <div class="msg-avatar-icon">🔗</div>
          <div class="msg-bubble"></div>
        `;
        container.appendChild(botEl);
      }

      const bubble = botEl.querySelector('.msg-bubble');
      bubble.innerHTML = formatContent(content);

      const container = document.getElementById('messages');
      container.scrollTop = container.scrollHeight;
    }

    // ====== INPUT HELPERS ======
    function inputKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function updateSendBtn() {
      const input = document.getElementById('chatInput');
      const btn = document.getElementById('sendBtn');
      if (isStreaming) {
        btn.disabled = false;
        btn.classList.add('stop-active');
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';
        btn.onclick = stopStreaming;
        btn.title = '停止生成';
      } else {
        btn.classList.remove('stop-active');
        btn.disabled = !input.value.trim();
        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>';
        btn.onclick = sendMessage;
        btn.title = '发送';
      }
    }

    document.getElementById('chatInput').addEventListener('input', updateSendBtn);

    // ====== INIT ======
    loadMessages();
    renderMessages();
    renderQuickGrid();
  </script>
</body>
</html>
